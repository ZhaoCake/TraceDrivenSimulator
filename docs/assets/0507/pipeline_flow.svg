<text x="30" y="244" font-size="14" font-family="Comic Sans MS, sans-serif" fill="#1e1e1e" text-anchor="start" opacity="1.0">→ 每周期数据沿 IF → ID → EX → MEM → WB 前进一级</text>
<text x="30" y="269" font-size="14" font-family="Comic Sans MS, sans-serif" fill="#1e1e1e" text-anchor="start" opacity="1.0">→ 锁存器 (Latch) 是阶段间的唯一接口</text>
<text x="30" y="294" font-size="14" font-family="Comic Sans MS, sans-serif" fill="#1e1e1e" text-anchor="start" opacity="1.0">→ 逆向执行 (WB→MEM→EX→ID→IF) 确保转发在同一周期生效</text>
